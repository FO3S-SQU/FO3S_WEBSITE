<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free and open source software society</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">FO3S</div>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#events">Events</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
            <div class="language_container">
                <Label>English</Label>
                <input type="checkbox" name="language_toggle" id="language_toggle">
            </div>
        </nav>
    </header>
    <main>
        <section id="hero">
            <h1>Welcome to the Free and Open Source Software Society</h1>
            <p>We learn to code and code to learn.</p>
            <a href="#JoinUs" class="btn">Join Us</a>
        </section>
        <section id="statistics">
            <div class="members_count_container">
                <h2 id="members_count">0</h2>
                <p>Members</p>
            </div>
            
            <div class="events_count_container">
                <h2 id="events_count">0</h2>
                <p>Events Hosted</p>
            </div>
        </section>

        <section id="upcoming-events">
            <h2>Upcoming Events</h2>
            <div class="event"></div>
        </section>

    </main>
    <footer>2025 (c) FO3S</footer>
</body>
</html>
